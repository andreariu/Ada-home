<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>ADA Home</title>

  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />

  <meta name="theme-color" content="#2f6b3f" />
</head>

<body>
  <div class="app">

    <header class="hero">
      <h1>ADA Home</h1>
      <p>Gestione quotidiana della famiglia</p>
      <span>Andrea · Daniela · Antonio</span>
    </header>

    <!-- LOGIN -->
    <section id="loginBox" class="card">
      <h2>Accesso famiglia</h2>
      <p class="muted">Accedi per sincronizzare i dati tra tutti i dispositivi.</p>

      <input id="emailInput" type="email" placeholder="Email" autocomplete="email" />
      <input id="passwordInput" type="password" placeholder="Password" autocomplete="current-password" />

      <button id="loginBtn">Accedi</button>

      <p id="loginError" class="error"></p>
    </section>

    <!-- APP -->
    <main id="mainApp" style="display: none;">

      <section class="card today">
        <h2>Oggi</h2>
        <p id="todayDate"></p>

        <div class="stats">
          <div>
            <strong id="urgentCount">0</strong>
            <span>Urgenti</span>
          </div>
          <div>
            <strong id="shoppingCount">0</strong>
            <span>Spesa</span>
          </div>
          <div>
            <strong id="monthExpenses">0.00 €</strong>
            <span>Spese mese</span>
          </div>
        </div>
      </section>

      <nav class="tabs">
        <button class="tab active" data-tab="spesa">Spesa</button>
        <button class="tab" data-tab="faccende">Faccende</button>
        <button class="tab" data-tab="scadenze">Scadenze</button>
        <button class="tab" data-tab="spese">Spese</button>
        <button class="tab" data-tab="note">Note</button>
      </nav>

      <!-- SPESA -->
      <section id="spesa" class="panel active card">
        <h2>Lista della spesa</h2>
        <input id="shoppingText" type="text" placeholder="Cosa manca in casa?" />
        <select id="shoppingPerson">
          <option>Andrea</option>
          <option>Daniela</option>
          <option>Antonio</option>
        </select>
        <button id="addShoppingBtn">Aggiungi</button>
        <div id="shoppingList" class="list"></div>
      </section>

      <!-- FACCENDE -->
      <section id="faccende" class="panel card">
        <h2>Faccende di casa</h2>
        <input id="choreText" type="text" placeholder="Attività da fare" />
        <select id="chorePerson">
          <option>Andrea</option>
          <option>Daniela</option>
          <option>Antonio</option>
        </select>
        <button id="addChoreBtn">Aggiungi</button>
        <div id="choreList" class="list"></div>
      </section>

      <!-- SCADENZE -->
      <section id="scadenze" class="panel card">
        <h2>Scadenze</h2>
        <input id="deadlineText" type="text" placeholder="Descrizione scadenza" />
        <input id="deadlineDate" type="date" />
        <select id="deadlinePerson">
          <option>Andrea</option>
          <option>Daniela</option>
          <option>Antonio</option>
        </select>
        <button id="addDeadlineBtn">Aggiungi</button>
        <div id="deadlineList" class="list"></div>
      </section>

      <!-- SPESE -->
      <section id="spese" class="panel card">
        <h2>Spese familiari</h2>
        <input id="expenseText" type="text" placeholder="Descrizione" />
        <input id="expenseAmount" type="number" placeholder="Importo €" step="0.01" />
        <select id="expenseCategory">
          <option>Casa</option>
          <option>Spesa</option>
          <option>Auto</option>
          <option>Bollette</option>
          <option>Salute</option>
          <option>Altro</option>
        </select>
        <select id="expensePerson">
          <option>Andrea</option>
          <option>Daniela</option>
          <option>Antonio</option>
        </select>
        <button id="addExpenseBtn">Aggiungi</button>
        <div id="expenseList" class="list"></div>
      </section>

      <!-- NOTE -->
      <section id="note" class="panel card">
        <h2>Note famiglia</h2>
        <textarea id="noteText" placeholder="Scrivi una nota"></textarea>
        <select id="notePerson">
          <option>Andrea</option>
          <option>Daniela</option>
          <option>Antonio</option>
        </select>
        <button id="addNoteBtn">Aggiungi</button>
        <div id="noteList" class="list"></div>
      </section>

      <button id="logoutBtn" class="secondary">Esci</button>

    </main>

  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
